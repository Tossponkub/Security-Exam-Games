<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 Security Cram Game - ติวเร่งด่วน!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 10px;
            overflow-x: hidden;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* HEADER */
        .header {
            text-align: center;
            padding: 20px;
            background: rgba(20, 25, 50, 0.8);
            border-radius: 12px;
            border-bottom: 3px solid #00d4ff;
            box-shadow: 0 8px 32px rgba(0, 212, 255, 0.1);
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: #00d4ff;
            font-size: 0.9em;
            font-weight: 500;
        }

        /* MODE SELECTOR */
        .mode-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            padding: 15px;
            background: rgba(30, 35, 60, 0.6);
            border-radius: 10px;
        }

        .mode-btn {
            padding: 10px 20px;
            border: 2px solid #00d4ff;
            background: transparent;
            color: #00d4ff;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            font-size: 0.95em;
        }

        .mode-btn:hover {
            background: #00d4ff;
            color: #0a0e27;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
        }

        .mode-btn.active {
            background: #00d4ff;
            color: #0a0e27;
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.4);
        }

        /* CHAPTER SELECTOR */
        .chapter-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            padding: 15px;
            background: rgba(30, 35, 60, 0.6);
            border-radius: 10px;
        }

        .ch-btn {
            padding: 10px 16px;
            border: 2px solid;
            background: transparent;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            min-width: 100px;
        }

        .ch-btn.ch1 { border-color: #3b82f6; color: #3b82f6; }
        .ch-btn.ch2 { border-color: #10b981; color: #10b981; }
        .ch-btn.ch3 { border-color: #a855f7; color: #a855f7; }
        .ch-btn.all { border-color: #f59e0b; color: #f59e0b; }

        .ch-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .ch-btn.active {
            font-weight: bold;
            transform: scale(1.05);
        }

        .ch-btn.ch1.active { background: #3b82f6; color: white; box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4); }
        .ch-btn.ch2.active { background: #10b981; color: white; box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4); }
        .ch-btn.ch3.active { background: #a855f7; color: white; box-shadow: 0 5px 15px rgba(168, 85, 247, 0.4); }
        .ch-btn.all.active { background: #f59e0b; color: white; box-shadow: 0 5px 15px rgba(245, 158, 11, 0.4); }

        /* STATS BAR */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            padding: 15px;
            background: rgba(30, 35, 60, 0.6);
            border-radius: 10px;
        }

        .stat-item {
            text-align: center;
            padding: 10px;
            background: rgba(0, 212, 255, 0.05);
            border-radius: 8px;
            border-left: 3px solid #00d4ff;
        }

        .stat-label {
            font-size: 0.85em;
            color: #a0a0a0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #00d4ff;
            margin-top: 5px;
        }

        /* PROGRESS BAR */
        .progress-section {
            background: rgba(30, 35, 60, 0.6);
            border-radius: 10px;
            padding: 15px;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9em;
            color: #a0a0a0;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #0099ff);
            transition: width 0.3s ease;
            border-radius: 4px;
        }

        /* MAIN GAME AREA */
        .game-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-height: 500px;
        }

        /* FLASHCARD MODE */
        .flashcard-container {
            perspective: 1000px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 400px;
        }

        .flashcard {
            width: 100%;
            max-width: 600px;
            height: 350px;
            position: relative;
            cursor: pointer;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .flashcard-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            font-weight: bold;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }

        .flashcard-front {
            background: linear-gradient(135deg, #1a4d7d 0%, #2a6db3 100%);
            border: 2px solid #00d4ff;
            color: #e0e0e0;
            flex-direction: column;
            gap: 15px;
        }

        .flashcard-front .label {
            font-size: 0.9em;
            color: #a0d4ff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .flashcard-front .keyword {
            font-size: 1.8em;
            color: #00d4ff;
            line-height: 1.3;
        }

        .flashcard-front .keyword-th {
            font-size: 1.4em;
            color: #a0d4ff;
            margin-top: 10px;
        }

        .flashcard-front .hint {
            margin-top: 20px;
            font-size: 0.85em;
            color: #7ca3c0;
            font-style: italic;
        }

        .flashcard-back {
            background: linear-gradient(135deg, #1a5d3d 0%, #2a8d5d 100%);
            border: 2px solid #10b981;
            color: #e0e0e0;
            transform: rotateY(180deg);
        }

        .flashcard-back .answer {
            font-size: 1.6em;
            color: #10b981;
            margin-bottom: 15px;
        }

        .flashcard-back .answer-th {
            font-size: 1.4em;
            color: #5ed3a0;
            margin-bottom: 20px;
        }

        .trick-box {
            background: rgba(16, 185, 129, 0.2);
            border: 2px solid #10b981;
            border-radius: 10px;
            padding: 12px;
            margin-top: 15px;
        }

        .trick-label {
            font-size: 0.85em;
            color: #7ed3b8;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .trick-text {
            font-size: 1.1em;
            color: #10b981;
            font-weight: bold;
            line-height: 1.3;
        }

        .trick-text-th {
            font-size: 1em;
            color: #5ed3a0;
            margin-top: 8px;
        }

        /* QUIZ MODE */
        .quiz-container {
            background: rgba(30, 35, 60, 0.6);
            border-radius: 12px;
            padding: 30px;
            border-left: 4px solid #00d4ff;
        }

        .quiz-header {
            margin-bottom: 30px;
            text-align: center;
        }

        .quiz-question {
            font-size: 1.3em;
            color: #00d4ff;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .quiz-question-th {
            font-size: 1.1em;
            color: #a0d4ff;
            margin-bottom: 20px;
        }


        .options-grid {
            display: grid;
            gap: 12px;
            margin-top: 20px;
        }

        .option {
            padding: 15px;
            border: 2px solid #444;
            background: rgba(50, 50, 80, 0.5);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            color: #e0e0e0;
        }

        .option:hover {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
            transform: translateX(5px);
        }

        .option.selected {
            border-color: #f59e0b;
            background: rgba(245, 158, 11, 0.15);
        }

        .option.correct {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            font-weight: bold;
        }

        .option.incorrect {
            border-color: #f06464;
            background: rgba(240, 100, 100, 0.15);
            color: #f06464;
        }

        /* NAVIGATION & CONTROLS */
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            padding: 20px;
            background: rgba(30, 35, 60, 0.6);
            border-radius: 10px;
            margin-top: 20px;
        }

        .control-btn {
            padding: 10px 20px;
            border: 2px solid #00d4ff;
            background: transparent;
            color: #00d4ff;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .control-btn:hover:not(:disabled) {
            background: #00d4ff;
            color: #0a0e27;
            transform: translateY(-2px);
        }

        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .control-btn.primary {
            border-color: #10b981;
            color: #10b981;
        }

        .control-btn.primary:hover:not(:disabled) {
            background: #10b981;
            color: #0a0e27;
        }

        .control-btn.danger {
            border-color: #f06464;
            color: #f06464;
        }

        .control-btn.danger:hover:not(:disabled) {
            background: #f06464;
            color: #0a0e27;
        }

        /* KEYBOARD HINTS */
        .keyboard-hints {
            font-size: 0.8em;
            color: #666;
            text-align: center;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 6px;
            margin-top: 10px;
        }

        .keyboard-hints kbd {
            background: #333;
            padding: 2px 6px;
            border-radius: 3px;
            border: 1px solid #555;
            font-family: monospace;
            color: #0f0;
        }

        /* WEAK AREAS */
        .weak-areas-list {
            background: rgba(30, 35, 60, 0.6);
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
            max-height: 200px;
            overflow-y: auto;
        }

        .weak-area-item {
            padding: 8px;
            background: rgba(240, 100, 100, 0.1);
            border-left: 3px solid #f06464;
            margin-bottom: 8px;
            border-radius: 4px;
            font-size: 0.9em;
        }

        .weak-area-item .count {
            color: #f06464;
            font-weight: bold;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.5em;
            }

            .flashcard {
                height: 300px;
            }

            .flashcard-face {
                padding: 20px;
            }

            .flashcard-front .keyword {
                font-size: 1.3em;
            }

            .quiz-container {
                padding: 20px;
            }

            .stats-bar {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* HIDDEN */
        .hidden {
            display: none;
        }

        /* MESSAGE */
        .message {
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .message.success {
            background: rgba(16, 185, 129, 0.2);
            border: 2px solid #10b981;
            color: #10b981;
        }

        .message.error {
            background: rgba(240, 100, 100, 0.2);
            border: 2px solid #f06464;
            color: #f06464;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧠 Security Cram Game</h1>
            <p>ติวเร่งด่วน! CISSP Security Memorization</p>
        </div>

        <div class="mode-selector">
            <button class="mode-btn active" id="modeFlashcard" onclick="setMode('flashcard')">🔄 Flashcard Mode</button>
            <button class="mode-btn" id="modeQuiz" onclick="setMode('quiz')">⚡ Speed Quiz Mode</button>
        </div>

        <div class="chapter-selector">
            <button class="ch-btn ch1 active" onclick="setChapter(1)">📘 Chapter 1</button>
            <button class="ch-btn ch2" onclick="setChapter(2)">📗 Chapter 2</button>
            <button class="ch-btn ch3" onclick="setChapter(3)">📙 Chapter 3</button>
            <button class="ch-btn all" onclick="setChapter(0)">🌟 All Chapters</button>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-label">Total</div>
                <div class="stat-value" id="totalStat">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Score</div>
                <div class="stat-value" id="scoreStat">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Accuracy</div>
                <div class="stat-value" id="accuracyStat">0%</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Streak</div>
                <div class="stat-value" id="streakStat">0</div>
            </div>
        </div>

        <div class="progress-section">
            <div class="progress-label">
                <span id="progressText">Question 0 of 0</span>
                <span id="chapterText">Chapter 1</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
        </div>

        <div class="game-area">
            <!-- FLASHCARD MODE -->
            <div id="flashcardMode" class="flashcard-container">
                <div class="flashcard" id="flashcard" onclick="toggleFlip()">
                    <div class="flashcard-face flashcard-front">
                        <div class="label">KEYWORD</div>
                        <div class="keyword" id="frontKeyword"></div>
                        <div class="keyword-th" id="frontKeywordTh"></div>
                        <div class="hint">Click to reveal answer 👆</div>
                    </div>
                    <div class="flashcard-face flashcard-back">
                        <div class="label">ANSWER</div>
                        <div class="answer" id="backAnswer"></div>
                        <div class="answer-th" id="backAnswerTh"></div>
                        <div class="trick-box">
                            <div class="trick-label">💡 Memory Trick:</div>
                            <div class="trick-text" id="backTrick"></div>
                            <div class="trick-text-th" id="backTrickTh"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- QUIZ MODE -->
            <div id="quizMode" class="quiz-container hidden">
                <div class="quiz-header">
                    <div class="quiz-question" id="quizQuestion"></div>
                    <div class="quiz-question-th" id="quizQuestionTh"></div>
                    <!-- timer removed -->
                </div>
                <div class="options-grid" id="optionsGrid"></div>
            </div>

            <!-- MESSAGE -->
            <div id="messageBox" class="hidden"></div>
        </div>

        <div class="controls">
            <button class="control-btn" id="prevBtn" onclick="prevQuestion()" title="← Previous or Press ← Arrow">← Previous</button>
            <button class="control-btn primary" id="nextBtn" onclick="nextQuestion()" title="→ Next or Press → Arrow">Next →</button>
            <button class="control-btn danger" id="weakAreasBtn" onclick="toggleWeakAreas()" title="Show and replay weak areas">🎯 Weak Areas</button>
            <button class="control-btn primary" onclick="shuffleQuestions()">🔀 Shuffle</button>
            <button class="control-btn" onclick="resetGame()">🔄 Reset</button>
        </div>

        <div id="weakAreasContainer" class="weak-areas-list hidden">
            <div style="font-weight: bold; color: #f06464; margin-bottom: 10px;">❌ Questions You Got Wrong:</div>
            <div id="weakAreasList"></div>
            <button class="control-btn danger" onclick="replayWeakAreas()" style="width: 100%; margin-top: 15px;">🔁 Replay Weak Areas</button>
        </div>

        <div class="keyboard-hints">
            <strong>Keyboard Shortcuts:</strong> <kbd>Space</kbd> Flip | <kbd>1-4</kbd> Answer (Quiz) | <kbd>←→</kbd> Navigate | <kbd>W</kbd> Weak Areas
        </div>
    </div>

    <script>

            { ch: 3, kw: "KISS Design Principle", kw_th: "KISS Design Principle", ans: "Keep It Simple, Stupid - avoid unnecessary complexity", ans_th: "Keep It Simple, Stupid - หลีกเลี่ยงความซับซ้อนที่ไม่จำเป็น", trick: "KISS = less complexity = less vulnerabilities", trick_th: "KISS = less complexity = less vulnerabilities", opts: ["Make it complex for security", "Keep It Simple, Stupid - avoid unnecessary complexity", "Use all available features", "Maximize code coverage"], opts_th: ["ทำให้ซับซ้อนเพื่อความปลอดภัย", "Keep It Simple, Stupid - หลีกเลี่ยงความซับซ้อนที่ไม่จำเป็น", "ใช้ฟีเจอร์ทั้งหมดที่มี", "เพิ่มการครอบคลุมโค้ดให้สูงสุด"], correct: 1 },
            { ch: 3, kw: "Side-Channel Attack", kw_th: "Side-Channel Attack", ans: "Attack using physical signals (power, timing, EMR)", ans_th: "โจมตีโดยใช้สัญญาณทางกายภาพ (power, timing, EMR)", trick: "Side = attack from the Side (not direct)", trick_th: "Side = attack จากข้างข้าง (ไม่ใช่ตรงๆ)", opts: ["Direct network attack", "Attack using physical signals (power, timing, EMR)", "Social engineering", "SQL injection"], opts_th: ["Direct network attack", "โจมตีโดยใช้สัญญาณทางกายภาพ (power, timing, EMR)", "Social engineering", "SQL injection"], correct: 1 },
            { ch: 3, kw: "IoT Security Concerns", kw_th: "IoT Security Concerns", ans: "Limited computing resources, large attack surface, hard to update", ans_th: "ทรัพยากรการคำนวณจำกัด พื้นผิวการโจมตีขนาดใหญ่ ยากต่อการอัปเดต", trick: "IoT = Internet of Threats (many devices, weak security)", trick_th: "IoT = Internet of Threats (many devices, weak security)", opts: ["Too much encryption", "Limited computing resources, large attack surface, hard to update", "Too expensive", "No network connection"], opts_th: ["การเข้ารหัสมากเกินไป", "ทรัพยากรการคำนวณจำกัด พื้นผิวการโจมตีขนาดใหญ่ ยากต่อการอัปเดต", "มีราคาแพงเกินไป", "ไม่มีการเชื่อมต่อเครือข่าย"], correct: 1 },
            { ch: 3, kw: "Embedded Systems Security", kw_th: "Embedded Systems Security", ans: "Fixed-function devices with limited patching ability", ans_th: "อุปกรณ์ที่มีฟังก์ชั่นคงที่และมีความสามารถในการแพตช์จำกัด", trick: "Embedded = stuck inside, hard to fix", trick_th: "Embedded = stuck inside, hard to fix", opts: ["Easy to update", "Fixed-function devices with limited patching ability", "Always connected to internet", "No security needed"], opts_th: ["ง่ายต่อการอัปเดต", "อุปกรณ์ที่มีฟังก์ชั่นคงที่และมีความสามารถในการแพตช์จำกัด", "เชื่อมต่ออินเทอร์เน็ตเสมอ", "ไม่จำเป็นต้องมีความปลอดภัย"], correct: 1 },
            { ch: 3, kw: "ECB Block Cipher Mode", kw_th: "ECB Block Cipher Mode", ans: "Each block encrypted separately (pattern visible, weakest)", ans_th: "แต่ละบล็อกเข้ารหัสแยกกัน (รูปแบบมองเห็นได้ อ่อนแอที่สุด)", trick: "ECB = Each Block same = bad (shows patterns)", trick_th: "ECB = Each Block same = bad (shows patterns)", opts: ["Chained blocks", "Each block encrypted separately (pattern visible, weakest)", "Counter-based", "Stream cipher"], opts_th: ["บล็อกที่เชื่อมต่อ", "แต่ละบล็อกเข้ารหัสแยกกัน (รูปแบบมองเห็นได้ อ่อนแอที่สุด)", "Counter-based", "Stream cipher"], correct: 1 },
            { ch: 3, kw: "CBC Block Cipher Mode", kw_th: "CBC Block Cipher Mode", ans: "Each block XORed with previous ciphertext (uses IV)", ans_th: "แต่ละบล็อก XOR ด้วย ciphertext ก่อนหน้า (ใช้ IV)", trick: "CBC = Chain Blocks Connected (stronger)", trick_th: "CBC = Chain Blocks Connected (stronger)", opts: ["Independent blocks", "Each block XORed with previous ciphertext (uses IV)", "Counter mode", "No encryption"], opts_th: ["บล็อกอิสระ", "แต่ละบล็อก XOR ด้วย ciphertext ก่อนหน้า (ใช้ IV)", "Counter mode", "No encryption"], correct: 1 }
        ];

        // ==================== STATE ====================
        let allQuestions = [...chapter1, ...chapter2, ...chapter3].filter(q => q.ch === 1).sort(() => Math.random() - 0.5);
        let currentChapter = 1;
        let currentMode = 'flashcard';
        let currentQuestionIndex = 0;
        let score = 0;
        let totalAnswered = 0;
        let streak = 0;
        let weakAreas = {};
        let isFlipped = false;

        // ==================== INITIALIZATION ====================
        function initGame() {
            updateQuestions();
            showQuestion();
            updateStats();
            document.addEventListener('keydown', handleKeypress);
        }

        function updateQuestions() {
            if (currentChapter === 0) {
                allQuestions = [...chapter1, ...chapter2, ...chapter3];
            } else {
                allQuestions = [...chapter1, ...chapter2, ...chapter3].filter(q => q.ch === currentChapter);
            }
            // Shuffle for better memorization
            allQuestions.sort(() => Math.random() - 0.5);
            currentQuestionIndex = 0;
            isFlipped = false;
        }

        // ==================== MODE SWITCHING ====================
        function setMode(mode) {
            currentMode = mode;
            isFlipped = false;

            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('mode' + (mode === 'flashcard' ? 'Flashcard' : 'Quiz')).classList.add('active');

            document.getElementById('flashcardMode').classList.toggle('hidden', mode !== 'flashcard');
            document.getElementById('quizMode').classList.toggle('hidden', mode === 'flashcard');

            showQuestion();
        }

        // ==================== CHAPTER SWITCHING ====================
        function setChapter(ch) {
            currentChapter = ch;
            updateQuestions();
            isFlipped = false;

            document.querySelectorAll('.ch-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector('.ch-btn.' + (ch === 0 ? 'all' : 'ch' + ch)).classList.add('active');

            updateChapterLabel();
            showQuestion();
            updateStats();
        }

        function updateChapterLabel() {
            const labels = {0: 'All Chapters', 1: 'Chapter 1', 2: 'Chapter 2', 3: 'Chapter 3'};
            document.getElementById('chapterText').textContent = labels[currentChapter];
        }

        // ==================== QUESTION DISPLAY ====================
        function showQuestion() {
            if (allQuestions.length === 0) {
                document.getElementById('messageBox').innerHTML = '<div class="message error">No questions available for this chapter</div>';
                return;
            }

            const q = allQuestions[currentQuestionIndex];
            updateProgress();

            if (currentMode === 'flashcard') {
                showFlashcard(q);
            } else {
                showQuiz(q);
            }
        }

        function showFlashcard(q) {
            const flashcard = document.getElementById('flashcard');
            flashcard.classList.remove('flipped');

            document.getElementById('frontKeyword').textContent = q.kw;
            document.getElementById('frontKeywordTh').textContent = q.kw_th;
            document.getElementById('backAnswer').textContent = q.ans;
            document.getElementById('backAnswerTh').textContent = q.ans_th;
            document.getElementById('backTrick').textContent = q.trick;
            document.getElementById('backTrickTh').textContent = q.trick_th;

            isFlipped = false;
        }

        function showQuiz(q) {
            document.getElementById('quizQuestion').textContent = q.kw;
            document.getElementById('quizQuestionTh').textContent = q.kw_th;

            const grid = document.getElementById('optionsGrid');
            grid.innerHTML = '';

            q.opts.forEach((opt, idx) => {
                const div = document.createElement('div');
                div.className = 'option';
                div.textContent = opt + ' / ' + q.opts_th[idx];
                div.onclick = () => selectOption(idx, q.correct, q);
                grid.appendChild(div);
            });

        }

        function selectOption(selected, correct, q) {

            document.querySelectorAll('.option').forEach((opt, idx) => {
                if (idx === correct) {
                    opt.classList.add('correct');
                } else if (idx === selected && selected !== correct) {
                    opt.classList.add('incorrect');
                }
                opt.style.pointerEvents = 'none';
            });

            if (selected === correct) {
                score++;
                streak++;
                showMessage('✓ Correct! 💡 ' + q.trick + ' / ' + q.trick_th, 'success');
            } else {
                streak = 0;
                weakAreas[q.kw] = (weakAreas[q.kw] || 0) + 1;
                showMessage('✗ ' + q.ans + ' | 💡 ' + q.trick + ' / ' + q.trick_th, 'error');
            }

            totalAnswered++;
            updateStats();

            setTimeout(() => {
                document.getElementById('messageBox').classList.add('hidden');
                nextQuestion();
            }, 2500);
        }

        function toggleFlip() {
            document.getElementById('flashcard').classList.toggle('flipped');
            isFlipped = !isFlipped;
        }

        // ==================== NAVIGATION ====================
        function nextQuestion() {
            if (currentQuestionIndex < allQuestions.length - 1) {
                currentQuestionIndex++;
                showQuestion();
            } else {
                showMessage('🎉 Reached end! Reset to restart.', 'success');
            }
        }

        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                isFlipped = false;
                showQuestion();
            }
        }

        function updateProgress() {
            const total = allQuestions.length;
            const current = currentQuestionIndex + 1;
            const percent = Math.round((current / total) * 100);

            document.getElementById('progressText').textContent = `Question ${current} of ${total}`;
            document.getElementById('progressFill').style.width = percent + '%';
        }

        function updateStats() {
            document.getElementById('totalStat').textContent = allQuestions.length;
            document.getElementById('scoreStat').textContent = score;

            const accuracy = totalAnswered === 0 ? 0 : Math.round((score / totalAnswered) * 100);
            document.getElementById('accuracyStat').textContent = accuracy + '%';
            document.getElementById('streakStat').textContent = streak;
        }

        function showMessage(msg, type) {
            const box = document.getElementById('messageBox');
            box.className = 'message ' + type;
            box.textContent = msg;
            box.classList.remove('hidden');
        }

        // ==================== WEAK AREAS ====================
        function toggleWeakAreas() {
            const container = document.getElementById('weakAreasContainer');
            container.classList.toggle('hidden');

            if (!container.classList.contains('hidden')) {
                updateWeakAreasList();
            }
        }

        function updateWeakAreasList() {
            const list = document.getElementById('weakAreasList');
            const sorted = Object.entries(weakAreas).sort((a, b) => b[1] - a[1]);

            if (sorted.length === 0) {
                list.innerHTML = '<div style="color: #10b981; text-align: center; padding: 20px;">Perfect! No weak areas yet 🎯</div>';
                return;
            }

            list.innerHTML = sorted.map(([kw, count]) =>
                `<div class="weak-area-item">${kw} <span class="count">×${count}</span></div>`
            ).join('');
        }

        function replayWeakAreas() {
            if (Object.keys(weakAreas).length === 0) {
                showMessage('No weak areas to replay!', 'error');
                return;
            }

            const weakKeywords = Object.keys(weakAreas);
            allQuestions = [...chapter1, ...chapter2, ...chapter3].filter(q => weakKeywords.includes(q.kw));
            currentQuestionIndex = 0;
            isFlipped = false;

            document.getElementById('weakAreasContainer').classList.add('hidden');
            showQuestion();
            showMessage('🎯 Replaying weak areas...', 'success');
        }

        function shuffleQuestions() {
            allQuestions.sort(() => Math.random() - 0.5);
            currentQuestionIndex = 0;
            isFlipped = false;
            showQuestion();
            showMessage('🔀 Questions shuffled!', 'success');
            setTimeout(() => document.getElementById('messageBox').classList.add('hidden'), 1200);
        }

        function resetGame() {
            if (confirm('Reset all progress?')) {
                score = 0;
                totalAnswered = 0;
                streak = 0;
                weakAreas = {};
                currentQuestionIndex = 0;
                isFlipped = false;

                updateQuestions();
                showQuestion();
                updateStats();
                showMessage('🔄 Game reset!', 'success');
            }
        }

        // ==================== KEYBOARD SHORTCUTS ====================
        function handleKeypress(e) {
            if (e.key === ' ') {
                e.preventDefault();
                if (currentMode === 'flashcard') toggleFlip();
            } else if (e.key === 'ArrowRight') {
                nextQuestion();
            } else if (e.key === 'ArrowLeft') {
                prevQuestion();
            } else if (e.key === 'w' || e.key === 'W') {
                toggleWeakAreas();
            } else if (currentMode === 'quiz' && ['1', '2', '3', '4'].includes(e.key)) {
                const idx = parseInt(e.key) - 1;
                const opts = document.querySelectorAll('.option');
                if (opts[idx] && opts[idx].style.pointerEvents !== 'none') {
                    opts[idx].click();
                }
            }
        }

        // ==================== START ====================
        window.addEventListener('load', initGame);
    </script>
